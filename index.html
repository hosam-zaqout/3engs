<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3eng.s - أهلاً بكم</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        h1 {
            color: #1e3a8a;
            font-size: 3em;
        }
        p {
            color: #333;
            font-size: 1.2em;
        }
        img.logo {
            width: 150px;
            margin-bottom: 20px;
        }
        .stickers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }
        .stickers img {
            width: 80px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="3eng.s Logo" class="logo">
    <h1>أهلاً بكم في 3eng.s</h1>
    <p>صفحة تجريبية لمشاريع هندسة كهربائية وإلكترونيات</p>
    
    <div class="stickers">
        <img src="sticker1.png" alt="Sticker 1">
        <img src="sticker2.png" alt="Sticker 2">
        <img src="sticker3.png" alt="Sticker 3">
        <img src="sticker4.png" alt="Sticker 4">
    </div>
</body>
</html>
